name: Build LEE Market APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: stable
      - name: Generate launcher icons from LEE Market logo
        run: |
          pip install Pillow --quiet
          python3 << 'PYEOF'
          from PIL import Image
          import os, base64, io

          # LEE Market real logo (192x192 base64)
          ICON_B64 = ""

          icon_data = base64.b64decode(ICON_B64)
          master = Image.open(io.BytesIO(icon_data)).convert("RGBA")

          sizes = {
              'mipmap-mdpi': 48,
              'mipmap-hdpi': 72,
              'mipmap-xhdpi': 96,
              'mipmap-xxhdpi': 144,
              'mipmap-xxxhdpi': 192,
          }

          base = 'android/app/src/main/res'
          for dirname, size in sizes.items():
              dir_path = os.path.join(base, dirname)
              os.makedirs(dir_path, exist_ok=True)
              resized = master.resize((size, size), Image.LANCZOS)
              resized.save(os.path.join(dir_path, 'ic_launcher.png'))
              resized.save(os.path.join(dir_path, 'ic_launcher_round.png'))

          print('LEE Market icons generated successfully')
          PYEOF
      - name: Get dependencies
        run: flutter pub get
      - name: Build APK
        run: flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LEE-Market-APK
          path: build/app/outputs/flutter-apk/app-release.apk
      - name: Build App Bundle (for Google Play)
        run: flutter build appbundle --release
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: LEE-Market-AAB-GooglePlay
          path: build/app/outputs/bundle/release/app-release.aab
